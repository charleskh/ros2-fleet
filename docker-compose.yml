# Fleet ROS2 — same file on the PC and the Jetson. Build + run with:
#   docker compose build
#   docker compose run --rm ros2                      # interactive shell, ROS sourced
#   docker compose run --rm ros2 ros2 run demo_nodes_cpp talker
#
# network_mode: host is what lets DDS discover nodes on OTHER machines across the LAN.

services:
  ros2:
    build: .
    image: fleet-ros2:humble
    network_mode: host                 # required for cross-machine ROS2 discovery
    environment:
      - ROS_DOMAIN_ID=10               # MUST match on every machine on the LAN
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp   # pin the same DDS impl everywhere
    volumes:
      - ./ros2_ws:/ros2_ws             # your packages persist on the host
    stdin_open: true                   # docker run -i
    tty: true                          # docker run -t
    command: bash

  # --- Jetson (hyperion) ONLY: L4T image with camera + GPU access ---
  # The plain `ros2` service above is for caliban/amd64. The Jetson uses THIS service,
  # built from Dockerfile.jetson (an NVIDIA L4T base). Same ROS2 graph (domain 10) — just
  # the variant that can reach the CSI camera and the GPU. Build + run ONLY on the Jetson:
  #   docker compose build ros2-jetson
  #   docker compose run --rm ros2-jetson
  ros2-jetson:
    build:
      context: .
      dockerfile: Dockerfile.jetson    # L4T-based, unlike the plain ./Dockerfile
    image: fleet-ros2:l4t
    network_mode: host                 # cross-machine ROS2 discovery
    environment:
      - ROS_DOMAIN_ID=10               # MUST match on every machine on the LAN
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    # GPU + camera/EGL/CUDA libs are injected via CDI (Container Device Interface). On
    # JetPack 6 the old `runtime: nvidia` CSV mounts are retired; instead the host generated
    # /etc/cdi/nvidia.yaml (`sudo nvidia-ctk cdi generate`) and we request that device here.
    # This replaces `runtime: nvidia`, which injected nothing on this host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    volumes:
      - ./ros2_ws:/ros2_ws             # your packages persist on the host
      - /tmp/argus_socket:/tmp/argus_socket   # talk to the host's nvargus-daemon (CSI camera)
    devices:
      - /dev/video0:/dev/video0        # the IMX219 sensor node
    stdin_open: true
    tty: true
    command: bash

    # --- ESP32 / serial, for motor control later ---
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
