# Fleet ROS2 — same file on the PC and the Jetson. Build + run with:
#   docker compose build
#   docker compose run --rm ros2                      # interactive shell, ROS sourced
#   docker compose run --rm ros2 ros2 run demo_nodes_cpp talker
#
# network_mode: host is what lets DDS discover nodes on OTHER machines across the LAN.

services:
  ros2:
    build: .
    image: fleet-ros2:humble
    network_mode: host                 # required for cross-machine ROS2 discovery
    ipc: host                          # share the host's /dev/shm so FastDDS shared-memory
                                       # transport works BETWEEN containers on the same host.
                                       # network_mode:host alone shares the network but each
                                       # container keeps its own /dev/shm; FastDDS picks SHM
                                       # for same-host peers, so without this discovery succeeds
                                       # but data (esp. large Image buffers) never arrives.
    environment:
      - ROS_DOMAIN_ID=10               # MUST match on every machine on the LAN
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp   # pin the same DDS impl everywhere
    volumes:
      - ./ros2_ws:/ros2_ws             # your packages persist on the host
    stdin_open: true                   # docker run -i
    tty: true                          # docker run -t
    command: bash

  # --- Jetson (hyperion) ONLY: L4T image with camera + GPU access ---
  # The plain `ros2` service above is for caliban/amd64. The Jetson uses THIS service,
  # built from Dockerfile.jetson (an NVIDIA L4T base). Same ROS2 graph (domain 10) — just
  # the variant that can reach the CSI camera and the GPU. Build + run ONLY on the Jetson:
  #   docker compose build ros2-jetson
  #   docker compose run --rm ros2-jetson
  ros2-jetson:
    build:
      context: .
      dockerfile: Dockerfile.jetson    # L4T-based, unlike the plain ./Dockerfile
    image: fleet-ros2:l4t
    network_mode: host                 # cross-machine ROS2 discovery
    ipc: host                          # share host /dev/shm for FastDDS SHM transport between
                                       # containers (camera node <-> foxglove_bridge, both here).
                                       # See the ros2 service above for the full why.
    environment:
      - ROS_DOMAIN_ID=10               # MUST match on every machine on the LAN
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      # glvnd's EGL loader searches /usr/share/glvnd/egl_vendor.d by default, but CDI mounts
      # NVIDIA's EGL ICD at the Jetson tegra path. Point the loader at it so nvvidconv's EGL
      # init (nvbufsurftransform) succeeds headless — otherwise "EGL failed to initialize!".
      - __EGL_VENDOR_LIBRARY_FILENAMES=/usr/lib/aarch64-linux-gnu/tegra-egl/nvidia.json
    # GPU + camera/EGL/CUDA libs are injected via CDI (Container Device Interface). On
    # JetPack 6 the old `runtime: nvidia` CSV mounts are retired; instead the host generated
    # /etc/cdi/nvidia.yaml (`sudo nvidia-ctk cdi generate`) and we request that device here.
    # This replaces `runtime: nvidia`, which injected nothing on this host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    volumes:
      - ./ros2_ws:/ros2_ws             # your packages persist on the host
      - /tmp/argus_socket:/tmp/argus_socket   # talk to the host's nvargus-daemon (CSI camera)
    devices:
      - /dev/video0:/dev/video0        # the IMX219 sensor node
    stdin_open: true
    tty: true
    command: bash

    # --- ESP32 / serial, for motor control later ---
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0

  # --- M5: one-command bring-up of the WHOLE perception graph (hyperion ONLY) ---
  # `docker compose up bringup` starts camera + TRT detector + foxglove_bridge together, via the
  # bringup launch file baked into the image. This is the DEPLOYMENT unit; the launch file is the
  # node-graph unit (docs Concept G/J). Same L4T image + CDI/camera wiring as ros2-jetson, but:
  #   - it runs the baked, immutable workspace (NO ./ros2_ws mount) — only narrow host paths below;
  #   - the entrypoint validates the Orin TRT engine exists, then launches (never builds at runtime).
  # Build + run on the Jetson:  docker compose up --build bringup
  # Non-TRT fallback:           BACKEND=ultralytics docker compose up bringup
  bringup:
    build:
      context: .
      dockerfile: Dockerfile.jetson
    image: fleet-ros2:l4t              # same image as ros2-jetson (whichever builds first wins the cache)
    network_mode: host                 # cross-machine ROS2 discovery + foxglove_bridge on :8765
    ipc: host                          # FastDDS SHM transport between the graph's nodes (see ros2 svc)
    restart: unless-stopped            # robot behaviour: bring the graph back after a crash/reboot
    environment:
      - ROS_DOMAIN_ID=10
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - __EGL_VENDOR_LIBRARY_FILENAMES=/usr/lib/aarch64-linux-gnu/tegra-egl/nvidia.json
      - BACKEND=${BACKEND:-trt}        # override: BACKEND=ultralytics docker compose up bringup
      - ENGINE=${ENGINE:-/ros2_ws/rung4/yolov8n.fp16.engine}
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    volumes:
      # NARROW mounts only — the workspace is baked into the image (immutable). We mount just the
      # host-specific / persistent paths: the gitignored TRT engine (built on THIS Orin in rung4/),
      # and the recordings dir so bags survive the container.
      - ./ros2_ws/rung4:/ros2_ws/rung4
      - ./ros2_ws/bags:/ros2_ws/bags
      - /tmp/argus_socket:/tmp/argus_socket   # host nvargus-daemon (CSI camera)
    devices:
      - /dev/video0:/dev/video0        # the IMX219 sensor node
    entrypoint: ["/usr/local/bin/bringup-entrypoint.sh"]
